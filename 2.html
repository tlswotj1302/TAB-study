<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Playlist</title>
    <link rel="stylesheet" href="2.css">
</head>
<body>

<div class="app">
    
    <!--맨 위에 x랑 playlist 코드-->
    <div class="head">
        <div class="x">X</div>
        <div class="playlist">Playlist</div>
        </div>

        <!--random love-->
    <div class="randomlove">
        <div class="picture">📷</div>
        <div class="name">
            <h1>Random Love</h1>
            <p>by Divay Kapoor</p>
        </div>
    </div>

    <!--버튼들-->
    <div class="button">
        <button class="play">▶️PLAY</button>
        <button class="heart">❤️</button>
        <button class="plus">➕</button>

    </div>

        <!--아래 리스트들-->
<div class="list">

  <div class="item">
    <div class="thumb red"></div>
    <div>
      <div class="songname">Matargasti</div>
      <div class="artist">Mohit Chauhan</div>
    </div>
  </div>

  <div class="item">
    <div class="thumb pink"></div>
    <div>
      <div class="songname">Attitude</div>
      <div class="artist">Lewis OfMan Attitude</div>
    </div>
  </div>

  <div class="item">
    <div class="thumb blue"></div>
    <div>
      <div class="songname">Try Everything</div>
      <div class="artist">Shakira Zootopia</div>
    </div>
  </div>

  <div class="item">
    <div class="thumb gray"></div>
    <div>
      <div class="songname">Sunflower</div>
      <div class="artist">Joseph Vincent Sunflower</div>
    </div>
  </div>

</div>
    
</div>


</body>
</html>
